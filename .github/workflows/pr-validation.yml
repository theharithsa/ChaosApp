# PR validation workflow
# Runs on pull requests to validate changes before merge

name: PR Validation

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Check for vulnerabilities
        id: audit
        run: |
          echo "## Security Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --json > audit.json || true
          
          CRITICAL=$(cat audit.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat audit.json | jq '.metadata.vulnerabilities.high // 0')
          
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

      - name: Check lodash version
        run: |
          LODASH_VERSION=$(node -p "require('lodash/package.json').version")
          echo "Lodash version: $LODASH_VERSION"
          
          if [ "$LODASH_VERSION" = "4.17.20" ]; then
            echo "⚠️ Vulnerable lodash version detected!" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Lodash version is safe" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Validate build
        run: npm run build --if-present

  # Auto-approve security fix PRs (when labeled)
  auto-approve:
    needs: validate
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'security-fix')
    
    permissions:
      pull-requests: write
    
    steps:
      - name: Auto-approve security fix
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add approval comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Automated Security Review Passed**\n\nThis PR has been automatically approved as a security fix.\n\n- Build: ✅ Passed\n- Tests: ✅ Passed\n- Security audit: ✅ Completed'
            })
